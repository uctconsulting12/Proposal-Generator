<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProposalPilot AI</title>
  <style>
    :root {
      --bg-app: #f3f5f7;
      --bg-panel: #ffffff;
      --bg-sidebar: #ffffff;
      --bg-soft: #f5f7f9;
      --bg-chat-bot: #effaf6;
      --bg-chat-user: #ffffff;
      --text: #0f1f23;
      --text-soft: #41545b;
      --muted: #748a92;
      --line: #e3e8eb;
      --line-strong: #cfd8dc;
      --brand: #0d4f4a;
      --brand-soft: #e1f0ec;
      --brand-dark: #093a37;
      --accent: #0f766e;
      --danger: #b91c1c;
      --success: #15803d;
      --warning: #b45309;
      --shadow-sm: 0 1px 2px rgba(15, 31, 35, 0.06);
      --shadow: 0 6px 20px rgba(15, 31, 35, 0.06);
      --radius: 12px;
    }

    body[data-theme="dark"] {
      --bg-app: #0b1418;
      --bg-panel: #11201f;
      --bg-sidebar: #0d1a1c;
      --bg-soft: #15262a;
      --bg-chat-bot: #143231;
      --bg-chat-user: #1a2c30;
      --text: #e8eef0;
      --text-soft: #b8c7cc;
      --muted: #7e949a;
      --line: #1f3133;
      --line-strong: #28464a;
      --brand: #14b8a6;
      --brand-soft: #143231;
      --brand-dark: #0f766e;
      --accent: #2dd4bf;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      font-family: "Plus Jakarta Sans", "Inter", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: var(--bg-app);
      font-size: 14px;
      line-height: 1.45;
    }

    button, input, textarea, select { font: inherit; color: inherit; }

    /* ---------- Layout shell ------------------------------------------- */
    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 22px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: -0.01em;
      font-size: 1.05rem;
    }

    .brand-dot {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
      display: inline-block;
    }

    .topnav {
      display: flex;
      gap: 22px;
      align-items: center;
    }

    .topnav a {
      color: var(--text-soft);
      text-decoration: none;
      font-weight: 600;
      padding: 6px 2px;
      border-bottom: 2px solid transparent;
      cursor: pointer;
    }
    .topnav a.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 12px;
      width: 260px;
    }
    .search input {
      border: 0; background: transparent; outline: none; width: 100%;
    }

    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--bg-panel);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-btn:hover { background: var(--bg-soft); }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    /* ---------- Body grid ---------------------------------------------- */
    .body {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 0;
    }

    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--line);
      padding: 18px 14px;
      overflow-y: auto;
    }

    .plan-card {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .plan-card .icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
    }
    .plan-card .title { font-weight: 700; font-size: 0.92rem; }
    .plan-card .sub   { color: var(--muted); font-size: 0.78rem; }

    .new-proposal-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .new-proposal-btn:hover { filter: brightness(1.05); }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--text-soft);
      cursor: pointer;
      font-weight: 600;
      border: 0;
      width: 100%;
      background: transparent;
      text-align: left;
    }
    .nav-item:hover { background: var(--bg-soft); }
    .nav-item.active {
      background: var(--brand-soft);
      color: var(--brand);
    }
    .nav-item .chev {
      margin-left: auto;
      transition: transform .2s ease;
    }
    .nav-item.open .chev { transform: rotate(90deg); }

    .nav-sub {
      margin: 4px 0 6px 32px;
      padding: 2px 0;
      max-height: 240px;
      overflow-y: auto;
      border-left: 1px solid var(--line);
    }
    .nav-sub button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      background: transparent;
      border: 0;
      border-radius: 8px;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.83rem;
      line-height: 1.3;
    }
    .nav-sub button:hover { background: var(--bg-soft); color: var(--text); }
    .nav-sub button.active { color: var(--brand); font-weight: 700; }
    .nav-sub .empty {
      padding: 8px 10px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* ---------- Main content ------------------------------------------- */
    .main {
      padding: 22px;
      overflow: auto;
    }

    .workspace-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      gap: 10px;
    }

    .panel-body {
      padding: 18px 20px;
    }

    .panel h2 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -0.01em;
      font-weight: 800;
    }
    .panel .panel-sub {
      color: var(--muted);
      margin: 4px 0 16px;
      font-size: 0.88rem;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-soft);
    }
    .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--bg-panel);
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(13, 79, 74, 0.15);
    }
    .field textarea { resize: vertical; min-height: 130px; line-height: 1.5; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .chip-input {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      padding: 8px 10px;
      background: var(--bg-panel);
      min-height: 44px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .chip {
      background: var(--brand-soft);
      color: var(--brand);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.82rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .chip button {
      background: transparent; border: 0; cursor: pointer;
      color: var(--brand); font-weight: 700;
    }
    .chip-input input {
      border: 0; outline: none; flex: 1;
      min-width: 100px; background: transparent;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: filter .15s ease, transform .08s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.05); }

    .btn-outline {
      background: var(--bg-panel);
      color: var(--brand);
      border: 1.5px solid var(--brand);
    }
    .btn-outline:hover:not(:disabled) { background: var(--brand-soft); }

    .btn-soft {
      background: var(--bg-soft);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .btn-soft:hover:not(:disabled) { background: var(--bg-panel); }

    .btn-success {
      background: linear-gradient(135deg, var(--success) 0%, #16a34a 100%);
      color: #fff;
    }

    /* ---------- Conversation panel ------------------------------------- */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 600;
    }
    .status-pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 0 4px var(--brand-soft);
    }
    .status-pill .stage-name { color: var(--brand); font-weight: 700; }

    .step-meta {
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: 700;
    }

    .chat-shell {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 70vh;
      min-height: 380px;
    }

    .chat-stream {
      flex: 1;
      overflow-y: auto;
      padding: 6px 4px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .msg-row.user { justify-content: flex-end; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 0.8rem;
    }
    .msg-avatar.bot { background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%); }
    .msg-avatar.user { background: #455a64; }

    .bubble {
      max-width: 78%;
      border-radius: 12px;
      padding: 12px 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid var(--line);
    }
    .bubble.bot {
      background: var(--bg-chat-bot);
      border-color: rgba(13, 79, 74, 0.18);
    }
    .bubble.user {
      background: var(--bg-chat-user);
    }
    .bubble.system {
      background: #fff8e1;
      border-color: #f3d27a;
      color: #5a4400;
    }
    body[data-theme="dark"] .bubble.system {
      background: #2a2410;
      border-color: #5a4a18;
      color: #f7d774;
    }

    .composer {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 8px 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .composer input {
      flex: 1; background: transparent; border: 0; outline: none;
      padding: 10px 4px;
    }
    .composer .send-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .footer-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: var(--muted);
      font-size: 0.8rem;
      padding-top: 4px;
    }

    /* ---------- Stat cards (dashboard) --------------------------------- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .stat {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .stat .label {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: .05em;
      font-weight: 700;
    }
    .stat .value { font-size: 1.9rem; font-weight: 800; margin-top: 4px; }
    .stat.success .value { color: var(--success); }
    .stat.warning .value { color: var(--warning); }
    .stat.brand .value { color: var(--brand); }

    /* ---------- Tables ------------------------------------------------- */
    table.simple {
      width: 100%;
      border-collapse: collapse;
    }
    table.simple th, table.simple td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 0.88rem;
    }
    table.simple th {
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: 700;
    }
    table.simple tbody tr:hover { background: var(--bg-soft); }

    .pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .pill.questioning { background: #fef3c7; color: #92400e; }
    .pill.draft { background: #dbeafe; color: #1e40af; }
    .pill.final { background: #dcfce7; color: #166534; }
    .pill.won { background: #dcfce7; color: #166534; }
    .pill.lost { background: #fee2e2; color: #991b1b; }
    .pill.pending { background: #e5e7eb; color: #374151; }

    body[data-theme="dark"] .pill.questioning { background: #3a2d10; color: #fcd34d; }
    body[data-theme="dark"] .pill.draft { background: #142a4a; color: #93c5fd; }
    body[data-theme="dark"] .pill.final { background: #103a22; color: #86efac; }
    body[data-theme="dark"] .pill.won { background: #103a22; color: #86efac; }
    body[data-theme="dark"] .pill.lost { background: #3a1010; color: #fca5a5; }
    body[data-theme="dark"] .pill.pending { background: #1d2528; color: #b8c7cc; }

    .doc-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 16px;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .doc-card .title { font-weight: 700; }
    .doc-card .meta { color: var(--muted); font-size: 0.78rem; }
    .doc-card .desc { color: var(--text-soft); font-size: 0.88rem; white-space: pre-wrap; }

    .status-line { color: var(--muted); font-size: 0.85rem; margin-top: 8px; }
    .status-line.error { color: var(--danger); }

    /* ---------- Login screen ------------------------------------------- */
    .login-shell {
      max-width: 440px;
      margin: 70px auto;
      padding: 0 16px;
    }
    .login-card {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 26px;
      box-shadow: var(--shadow);
    }
    .login-title { font-size: 1.4rem; margin: 0 0 4px; font-weight: 800; color: var(--brand); }
    .login-sub { color: var(--muted); margin-bottom: 18px; }

    @media (max-width: 1100px) {
      .workspace-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .topnav { display: none; }
      .search { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="/vendor/react.production.min.js"></script>
  <script src="/vendor/react-dom.production.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
